<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>personajes | descifrAndo munDos</title>
    <link href="../style.css" rel="stylesheet" type="text/css" media="all">
  </head>

  <body class="libros-page">
    <header>
      <h1>personajes</h1>
      <p class="subtitle" id="book-title">mis libros</p>
      <p class="intro">fichas de personajes, rarezas, talentos y heridas</p>
    </header>

    <div id="menu"></div>

    <main>
      <section class="card admin-only">
        <h2>nuevo personaje</h2>

        <form id="character-form" class="review-form">
          <label for="name">nombre</label>
          <input type="text" id="name" required>

          <label for="birth">fecha de nacimiento</label>
          <input type="text" id="birth" placeholder="Ej: 14 de abril / desconocida">

          <label for="nickname">apodo</label>
          <input type="text" id="nickname" placeholder="cómo le llaman, si tiene apodo">

          <label for="role">papel en la historia</label>
          <input type="text" id="role" placeholder="protagonista, antagonista, aliado...">

          <label for="mbti">MBTI</label>
          <input type="text" id="mbti" placeholder="Ej: INFJ, ENTP...">

          <label for="likes">gustos</label>
          <textarea id="likes" placeholder="cosas que le gustan..."></textarea>

          <label for="color">color favorito</label>
          <input type="text" id="color">

          <label for="food">comida favorita</label>
          <input type="text" id="food">

          <label for="pet">mascota</label>
          <input type="text" id="pet" placeholder="si tiene, si quiere una, si odia la idea...">

          <label for="hates">cosas que detesta</label>
          <textarea id="hates"></textarea>

          <label for="talents">talentos</label>
          <textarea id="talents"></textarea>

          <label for="weaknesses">debilidades</label>
          <textarea id="weaknesses"></textarea>

          <label for="fear">miedo</label>
          <textarea id="fear"></textarea>

          <label for="dream">deseo o sueño</label>
          <textarea id="dream"></textarea>

          <label for="secret">secreto</label>
          <textarea id="secret"></textarea>

          <label for="quote">frase</label>
          <textarea id="quote" placeholder="algo que diría o que le define"></textarea>

          <label for="photo">foto</label>
          <input type="file" id="photo" accept="image/*">

          <label for="description">descripción general</label>
          <textarea id="description"></textarea>

          <button type="submit">guardar personaje</button>
        </form>
      </section>

      <section class="card">
        <h2>personajes guardados</h2>
        <div id="characters"></div>
      </section>
    </main>

    <div id="footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase.js"></script>
    <script src="../footer.js"></script>
    <script src="../menu.js"></script>
    <script src="../admin.js"></script>
    <script src="../supabase-data.js?v=edit2"></script>
  </body>
</html>
